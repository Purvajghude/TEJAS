<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TEJAS · Experiment: Procedural Sun (sun-v4)</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; }
  /* ultra-subtle warm amber radial gradient in the space background */
  body { background: radial-gradient(circle at 38% 50%, #0a0400 0%, #050200 38%, #000000 72%); }
  #c { display: block; width: 100vw; height: 100vh; }

  /* 1px translucent viewport frame */
  .frame {
    position: fixed; inset: 10px; pointer-events: none; z-index: 5;
    border: 1px solid rgba(255,255,255,0.10); border-radius: 8px;
  }

  /* weight-300 uppercase mono UI overlay */
  .ui {
    font-family: "SFMono-Regular", "Consolas", ui-monospace, monospace;
    font-weight: 300; text-transform: uppercase; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.85); pointer-events: none; user-select: none;
    position: fixed; z-index: 6;
  }
  .ui-tl { left: 26px; bottom: 24px; font-size: 12px; }
  .ui-tl small { display:block; letter-spacing:0.12em; text-transform:none;
    color: rgba(255,255,255,0.40); margin-top:5px; font-size:11px; }
  .ui-tr { right: 26px; top: 22px; font-size: 11px; color: rgba(255,255,255,0.55);
    text-align: right; line-height: 1.7; }
  .ui-hint { right: 26px; bottom: 24px; font-size: 10px; color: rgba(255,255,255,0.30);
    letter-spacing: 0.12em; text-transform: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="frame"></div>
<div class="ui ui-tl">Quiet Sun<small>sun-v4 · procedural · no textures</small></div>
<div class="ui ui-tr">FILTER: Fe XVIII 94&Aring;<br>FOV: 1.2 R&#9737;</div>
<div class="ui ui-hint">drag to rotate · scroll to zoom</div>

<!-- Three.js r128 + post-processing (CDN, no build step) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/MaskPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
(function () {
  const canvas = document.getElementById('c');
  const SUN_RADIUS = 1.0;

  // ---------- renderer ----------
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // capped for venue GPUs
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.95;
  renderer.setClearColor(0x000000, 0); // transparent -> CSS amber gradient shows through

  const scene = new THREE.Scene();   // NO lights: sun is 100% emissive
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 3.2);

  const sunSystem = new THREE.Group();
  sunSystem.position.x = -0.45;       // rule-of-thirds framing
  scene.add(sunSystem);

  // ---------- shared GLSL: 3D simplex noise (Ashima) ----------
  const NOISE = `
    vec3 mod289(vec3 x){return x - floor(x*(1.0/289.0))*289.0;}
    vec4 mod289(vec4 x){return x - floor(x*(1.0/289.0))*289.0;}
    vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
    vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314*r;}
    float snoise(vec3 v){
      const vec2 C = vec2(1.0/6.0, 1.0/3.0);
      const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
      vec3 i  = floor(v + dot(v, C.yyy));
      vec3 x0 = v - i + dot(i, C.xxx);
      vec3 g = step(x0.yzx, x0.xyz);
      vec3 l = 1.0 - g;
      vec3 i1 = min(g.xyz, l.zxy);
      vec3 i2 = max(g.xyz, l.zxy);
      vec3 x1 = x0 - i1 + C.xxx;
      vec3 x2 = x0 - i2 + C.yyy;
      vec3 x3 = x0 - D.yyy;
      i = mod289(i);
      vec4 p = permute( permute( permute(
                 i.z + vec4(0.0, i1.z, i2.z, 1.0))
               + i.y + vec4(0.0, i1.y, i2.y, 1.0))
               + i.x + vec4(0.0, i1.x, i2.x, 1.0));
      float n_ = 0.142857142857;
      vec3 ns = n_ * D.wyz - D.xzx;
      vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
      vec4 x_ = floor(j * ns.z);
      vec4 y_ = floor(j - 7.0 * x_);
      vec4 x = x_ * ns.x + ns.yyyy;
      vec4 y = y_ * ns.x + ns.yyyy;
      vec4 h = 1.0 - abs(x) - abs(y);
      vec4 b0 = vec4(x.xy, y.xy);
      vec4 b1 = vec4(x.zw, y.zw);
      vec4 s0 = floor(b0)*2.0 + 1.0;
      vec4 s1 = floor(b1)*2.0 + 1.0;
      vec4 sh = -step(h, vec4(0.0));
      vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
      vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
      vec3 p0 = vec3(a0.xy, h.x);
      vec3 p1 = vec3(a0.zw, h.y);
      vec3 p2 = vec3(a1.xy, h.z);
      vec3 p3 = vec3(a1.zw, h.w);
      vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
      p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
      vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
      m = m*m;
      return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
    }
    float fbm(vec3 p){
      float v = 0.0, a = 0.5;
      for (int i = 0; i < 4; i++){ v += a*snoise(p); p *= 2.0; a *= 0.5; }
      return v;
    }
  `;

  // ---------- photosphere ----------
  const sunGeo = new THREE.SphereGeometry(SUN_RADIUS, 128, 128);
  const sunMat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 } },
    vertexShader: `
      varying vec3 vPos; varying vec3 vNormalV;
      void main(){
        vPos = position;
        vNormalV = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: NOISE + `
      uniform float time;
      varying vec3 vPos; varying vec3 vNormalV;

      // deep crimson trough -> orange -> incandescent WHITE peak (no flat yellow)
      vec3 ramp(float t){
        vec3 c0 = vec3(0.45, 0.04, 0.0);   // deep crimson trough
        vec3 c1 = vec3(0.85, 0.16, 0.0);   // red
        vec3 c2 = vec3(1.00, 0.42, 0.06);  // deep orange
        vec3 c3 = vec3(1.00, 0.66, 0.20);  // amber (brief)
        vec3 c4 = vec3(1.00, 1.00, 0.95);  // incandescent white
        vec3 c = mix(c0, c1, smoothstep(0.00, 0.32, t));
        c = mix(c, c2, smoothstep(0.32, 0.60, t));
        c = mix(c, c3, smoothstep(0.60, 0.82, t));
        c = mix(c, c4, smoothstep(0.82, 1.00, t));
        return c;
      }

      void main(){
        vec3 p = normalize(vPos);
        float t = time * 0.06;

        // domain warping -> viscous plasma
        float w = fbm(p * 2.5 + vec3(0.0, t, 0.0));
        vec3 wp = p + w * 0.28;

        float conv = fbm(wp * 5.0  - vec3(t * 0.5));
        float gran = fbm(wp * 16.0 + vec3(t * 1.4));
        float fine = fbm(wp * 34.0 + vec3(t * 2.2));
        float n = 0.50 * conv + 0.34 * gran + 0.16 * fine;
        n = n * 0.5 + 0.5;
        // crank contrast BEFORE color map: crimson troughs cut sharply through white cells
        n = clamp((n - 0.5) * 1.65 + 0.5, 0.0, 1.0);
        n = pow(n, 1.20);

        float ar = smoothstep(0.72, 0.95, fbm(wp * 2.0 + vec3(t * 0.3)));
        n = mix(n, min(1.0, n + 0.55), ar * 0.85);

        vec3 col = ramp(n);

        // tiny, intensely bright white faculae speckle
        float spk = smoothstep(0.86, 1.0, fbm(p * 55.0 + vec3(t * 3.0)));
        col += vec3(1.0, 1.0, 0.95) * spk * spk * 1.6;

        // limb darkening + reddening (floor stays crimson)
        float ndv = max(dot(normalize(vNormalV), vec3(0.0, 0.0, 1.0)), 0.0);
        float limb = pow(ndv, 0.5);
        col *= mix(0.55, 1.12, limb);
        col = mix(col * vec3(1.0, 0.50, 0.26), col, limb);

        // internal Fresnel rim glow
        float rim = pow(1.0 - ndv, 3.0);
        col += vec3(1.0, 0.52, 0.16) * rim * 1.1;

        col *= 1.35;   // HDR, unclamped -> drives bloom
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
  const sun = new THREE.Mesh(sunGeo, sunMat);
  sun.renderOrder = 1;
  sunSystem.add(sun);

  // ---------- corona: polar-coordinate needle rays + sweeping streamers ----------
  function makeCorona(radius, power, alpha, rayFreq, streamerScale, innerShadow, inner, outer, order) {
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        time: { value: 0 }, power: { value: power }, alpha: { value: alpha },
        rayFreq: { value: rayFreq }, streamerScale: { value: streamerScale },
        innerShadow: { value: innerShadow },
        cInner: { value: new THREE.Color(inner[0], inner[1], inner[2]) },
        cOuter: { value: new THREE.Color(outer[0], outer[1], outer[2]) },
      },
      vertexShader: `
        varying vec3 vPos; varying vec3 vNormalV;
        void main(){
          vPos = position;
          vNormalV = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: NOISE + `
        uniform float time, power, alpha, rayFreq, streamerScale, innerShadow;
        uniform vec3 cInner, cOuter;
        varying vec3 vPos; varying vec3 vNormalV;
        const float PI = 3.14159265;
        void main(){
          float ndv = max(dot(normalize(vNormalV), vec3(0.0,0.0,1.0)), 0.0);
          float fres = pow(1.0 - ndv, power);   // high power -> soft outer boundary

          // POLAR coords: angle drives fine radial needles, radius is stretched flat
          vec3 np = normalize(vPos);
          float ang = atan(np.y, np.x);                 // -PI..PI
          float rad = acos(clamp(np.z, -1.0, 1.0));     // 0..PI from view axis
          // needle rays: dense in angle (x15), stretched in radius (x0.1)
          float rays = fbm(vec3(rad * 0.1 * rayFreq, ang * 15.0, time * 0.10));
          rays = rays * 0.5 + 0.5;
          // low-frequency streamer / quadrant variation swept slowly around the disc
          float streamer = fbm(vec3(ang * streamerScale, time * 0.04, 0.0)) * 0.5 + 0.5;

          float f = fres * (0.30 + 0.95 * rays) * (0.45 + 0.7 * streamer);

          vec3 col = mix(cOuter, cInner, fres) * 1.3;
          // subtle dark-orange inner shadow nearest the core to separate corona from body
          col *= mix(vec3(1.0), vec3(0.55, 0.32, 0.12), innerShadow * (1.0 - fres));
          gl_FragColor = vec4(col, max(f, 0.0) * alpha);
        }
      `,
      transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false,
    });
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 96, 96), mat);
    mesh.renderOrder = order;
    sunSystem.add(mesh);
    return { mesh, mat };
  }
  const coronaInner = makeCorona(1.02, 3.0, 0.50, 9.0, 2.0, 0.35,
                                 [1.0, 0.62, 0.10], [1.0, 0.40, 0.05], 2);
  const coronaOuter = makeCorona(2.20, 6.0, 0.26, 6.0, 1.5, 0.0,
                                 [1.0, 0.55, 0.12], [1.0, 0.32, 0.04], 3);

  // ---------- prominences: crimson plasma tubes, roots buried inside the core ----------
  const proms = [];
  (function makeProminences() {
    const N = 10;
    for (let k = 0; k < N; k++) {
      const d = new THREE.Vector3(Math.random()*2-1, Math.random()*2-1, Math.random()*2-1).normalize();
      let a = new THREE.Vector3().crossVectors(d, new THREE.Vector3(0,1,0));
      if (a.lengthSq() < 0.01) a = new THREE.Vector3().crossVectors(d, new THREE.Vector3(1,0,0));
      a.normalize();
      const sep = 0.10 + Math.random()*0.10;
      const hgt = 0.12 + Math.random()*0.20;
      const root = 0.82;  // feet buried below the surface (ILM #4)
      const pts = [
        d.clone().multiplyScalar(SUN_RADIUS*root).addScaledVector(a, -sep),
        d.clone().multiplyScalar(SUN_RADIUS*(1+hgt*0.55)).addScaledVector(a, -sep*0.4),
        d.clone().multiplyScalar(SUN_RADIUS*(1+hgt)),
        d.clone().multiplyScalar(SUN_RADIUS*(1+hgt*0.55)).addScaledVector(a, sep*0.4),
        d.clone().multiplyScalar(SUN_RADIUS*root).addScaledVector(a, sep),
      ];
      const curve = new THREE.CatmullRomCurve3(pts);
      const geo = new THREE.TubeGeometry(curve, 24, 0.010 + Math.random()*0.006, 6, false);
      const mat = new THREE.ShaderMaterial({
        uniforms: { time: { value: 0 }, phase: { value: Math.random()*6.28 } },
        vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
        fragmentShader: `
          uniform float time, phase; varying vec2 vUv;
          void main(){
            vec3 crimson = vec3(0.80, 0.10, 0.02);   // deep crimson, NOT white neon
            vec3 hot     = vec3(1.00, 0.35, 0.08);
            vec3 col = mix(crimson, hot, vUv.x);
            float tip = smoothstep(0.0,0.14,vUv.x) * smoothstep(1.0,0.84,vUv.x);
            float pulse = 0.7 + 0.3*sin(time*2.0 + phase);
            gl_FragColor = vec4(col, tip * pulse * 0.7);   // opacity ~0.7
          }
        `,
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.renderOrder = 2;
      sunSystem.add(mesh);
      proms.push(mat);
    }
  })();

  // ---------- starfield ----------
  (function stars() {
    const N = 3500;
    const pos = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      const r = 30 + Math.random() * 40;
      const u = Math.random() * 2 - 1;
      const th = Math.random() * Math.PI * 2;
      const s = Math.sqrt(1 - u * u);
      pos[i*3] = r*s*Math.cos(th); pos[i*3+1] = r*u; pos[i*3+2] = r*s*Math.sin(th);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const m = new THREE.PointsMaterial({ color: 0xffffff, size: 0.085, sizeAttenuation: true,
      transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending, depthWrite: false });
    scene.add(new THREE.Points(g, m));
  })();

  // ---------- post-processing chain: render -> bloom -> chromatic aberration -> grain ----------
  const composer = new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene, camera));

  const bloom = new THREE.UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight), 1.6, 0.45, 0.10);
  composer.addPass(bloom);

  // radial chromatic aberration
  const caPass = new THREE.ShaderPass({
    uniforms: { tDiffuse: { value: null }, amount: { value: 0.0015 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
    fragmentShader: `
      uniform sampler2D tDiffuse; uniform float amount; varying vec2 vUv;
      void main(){
        vec2 dir = vUv - 0.5;
        vec2 off = dir * length(dir) * amount * 4.0;
        float r = texture2D(tDiffuse, vUv - off).r;
        float g = texture2D(tDiffuse, vUv).g;
        float b = texture2D(tDiffuse, vUv + off).b;
        gl_FragColor = vec4(r, g, b, 1.0);
      }
    `
  });
  composer.addPass(caPass);

  // animated film grain
  const grainPass = new THREE.ShaderPass({
    uniforms: { tDiffuse: { value: null }, time: { value: 0 }, opacity: { value: 0.04 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
    fragmentShader: `
      uniform sampler2D tDiffuse; uniform float time, opacity; varying vec2 vUv;
      float rand(vec2 c){ return fract(sin(dot(c, vec2(12.9898,78.233))) * 43758.5453); }
      void main(){
        vec4 col = texture2D(tDiffuse, vUv);
        float g = rand(vUv + fract(time));
        col.rgb += (g - 0.5) * opacity;
        gl_FragColor = col;
      }
    `
  });
  composer.addPass(grainPass);

  // ---------- interaction ----------
  let dragging = false, lx = 0, ly = 0, autorot = true, lastUp = 0;
  canvas.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; });
  window.addEventListener('mouseup', () => { if (dragging) { dragging = false; lastUp = performance.now(); } });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    sunSystem.rotation.y += (e.clientX - lx) * 0.005;
    sunSystem.rotation.x += (e.clientY - ly) * 0.005;
    sunSystem.rotation.x = Math.max(-1.2, Math.min(1.2, sunSystem.rotation.x));
    lx = e.clientX; ly = e.clientY;
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    camera.position.z = Math.max(1.8, Math.min(7, camera.position.z + e.deltaY * 0.002));
  }, { passive: false });

  // ---------- resize (aspect-correct) ----------
  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    composer.setSize(w, h);
    bloom.resolution.set(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  // ---------- loop ----------
  const clock = new THREE.Clock();
  function tick(tt) {
    sunMat.uniforms.time.value = tt * 0.4;   // core at 0.4x corona speed
    coronaInner.mat.uniforms.time.value = tt;
    coronaOuter.mat.uniforms.time.value = tt;
    for (let i = 0; i < proms.length; i++) proms[i].uniforms.time.value = tt;
    grainPass.uniforms.time.value = tt;
    composer.render();
  }
  window.__render = function (t) { tick(typeof t === 'number' ? t : clock.getElapsedTime()); };

  (function animate() {
    requestAnimationFrame(animate);
    if (autorot && !dragging && performance.now() - lastUp > 2000) sunSystem.rotation.y += 0.0012;
    tick(clock.getElapsedTime());
  })();
})();
</script>
</body>
</html>
