<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOLAR INTELLIGENCE · Magnetospheric Impact (earth-v5)</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  #c { display: block; width: 100vw; height: 100vh; }
  .frame { position: fixed; inset: 12px; pointer-events: none; z-index: 5;
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; }
  .ui {
    font-family: "Space Grotesk", "SFMono-Regular", ui-monospace, monospace;
    font-weight: 300; text-transform: uppercase; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.9); pointer-events: none; user-select: none;
    position: fixed; z-index: 6; padding: 28px; text-shadow: 0 0 6px rgba(0,0,0,0.9);
  }
  .ui-tl { left: 0; bottom: 0; font-size: 13px; font-weight: 400; }
  .ui-tl small { display:block; letter-spacing:0.14em; text-transform:none;
    color: rgba(255,255,255,0.5); margin-top:6px; font-size:11px; }
  .ui-tr { right: 0; top: 0; font-size: 11px; color: rgba(255,255,255,0.8); text-align: right; line-height: 1.8; }
  .ui-hint { right: 0; bottom: 0; font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 0.15em; }
  .live-indicator { color: #00FF66; font-weight: 600; animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="frame"></div>
<div class="ui ui-tl">6 Magnetospheric Impact<small>Aditya-L1 Forecast · Kp 7.1 · G3 Storm</small></div>
<div class="ui ui-tr" id="telemetry">Bz: -18.6 nT<br>Vsw: 782 km/s | FPS: 60 <span class="live-indicator">● LIVE</span></div>
<div class="ui ui-hint">drag to orbit · scroll to zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
(function () {
  const canvas = document.getElementById('c');
  const EARTH_R = 1.0;
  // 20. Offset main group position to x = -1.1 for rule-of-thirds framing
  const GROUP_X = -1.1;
  const SUN_DIR = new THREE.Vector3(-1.0, 0.0, 0.0);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.setClearColor(0x000000, 1.0);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  
  const camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 5.6);

  // 18. Parent Earth, Auroras, and Dipole inside a single group, tilted exactly 23.5 degrees (rotation.z = 0.41015)
  const mainGroup = new THREE.Group();
  mainGroup.position.x = GROUP_X;
  mainGroup.rotation.z = 0.41015;
  scene.add(mainGroup);

  const earthGroup = new THREE.Group();  mainGroup.add(earthGroup); 
  const magGroup   = new THREE.Group();  mainGroup.add(magGroup); 
  
  // Bow shock remains un-tilted to face the solar wind
  const shockGroup = new THREE.Group();  
  shockGroup.position.x = GROUP_X;  
  scene.add(shockGroup);

  // 10. Reduce DirectionalLight intensity from 1.2 down to 0.9
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
  dirLight.position.set(-50, 0, 0);
  scene.add(dirLight);

  const state = { bz: -18.6, auroraBoost: 1, shockCompress: 1 };
  function applyBz(bz) {
    state.bz = bz;
    state.auroraBoost  = bz < 0 ? 1 + 3 * Math.min(1, Math.abs(bz) / 20) : 1;
    state.shockCompress = bz < 0 ? 1 - 0.3 * Math.min(1, Math.abs(bz) / 20) : 1;
  }
  applyBz(state.bz);
  window.__setBz = applyBz;

  // Standard Simplex Noise implementation in GLSL
  const NOISE = `
    vec3 mod289(vec3 x){return x - floor(x*(1.0/289.0))*289.0;}
    vec4 mod289(vec4 x){return x - floor(x*(1.0/289.0))*289.0;}
    vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
    float snoise(vec3 v){
      const vec2 C = vec2(1.0/6.0, 1.0/3.0);
      const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
      vec3 i  = floor(v + dot(v, C.yyy));
      vec3 x0 = v - i + dot(i, C.xxx);
      vec3 g = step(x0.yzx, x0.xyz);
      vec3 l = 1.0 - g;
      vec3 i1 = min(g.xyz, l.zxy);
      vec3 i2 = max(g.xyz, l.zxy);
      vec3 x1 = x0 - i1 + C.xxx;
      vec3 x2 = x0 - i2 + C.yyy;
      vec3 x3 = x0 - D.yyy;
      i = mod289(i);
      vec4 p = permute( permute( permute(
                 i.z + vec4(0.0, i1.z, i2.z, 1.0))
               + i.y + vec4(0.0, i1.y, i2.y, 1.0))
               + i.x + vec4(0.0, i1.x, i2.x, 1.0));
      float n_ = 0.142857142857;
      vec3 ns = n_ * D.wyz - D.xzx;
      vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
      vec4 x_ = floor(j * ns.z);
      vec4 y_ = floor(j - 7.0 * x_);
      vec4 x = x_ * ns.x + ns.yyyy;
      vec4 y = y_ * ns.x + ns.yyyy;
      vec4 h = 1.0 - abs(x) - abs(y);
      vec4 b0 = vec4(x.xy, y.xy);
      vec4 b1 = vec4(x.zw, y.zw);
      vec4 s0 = floor(b0)*2.0 + 1.0;
      vec4 s1 = floor(b1)*2.0 + 1.0;
      vec4 sh = -step(h, vec4(0.0));
      vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
      vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
      vec3 p0 = vec3(a0.xy, h.x);
      vec3 p1 = vec3(a0.zw, h.y);
      vec3 p2 = vec3(a1.xy, h.z);
      vec3 p3 = vec3(a1.zw, h.w);
      vec4 norm = 1.79284291400159 - 0.85373472095314 * vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3));
      p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
      vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
      m = m*m;
      return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
    }
  `;

  const texLoader = new THREE.TextureLoader();

  // 11. Enable anisotropic texture filtering (anisotropy: 16)
  const maxAnisotropy = renderer.capabilities.getMaxAnisotropy();
  const anisotropyVal = Math.min(16, maxAnisotropy);

  const earthDiffuse = texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
  earthDiffuse.anisotropy = anisotropyVal;

  const earthNormal = texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg');
  earthNormal.anisotropy = anisotropyVal;

  const earthLights = texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_lights_2048.png');
  earthLights.anisotropy = anisotropyVal;

  // 10. Earth Specular & Lighting: MeshStandardMaterial with roughness 0.6, metalness 0.1
  const earthMat = new THREE.MeshStandardMaterial({
    map: earthDiffuse,
    normalMap: earthNormal,
    roughness: 0.6,
    metalness: 0.1,
    emissive: new THREE.Color(0xffffff),
    emissiveMap: earthLights
  });

  earthMat.onBeforeCompile = (shader) => {
    shader.uniforms.sunDir = { value: SUN_DIR.clone() };
    
    shader.vertexShader = 'varying vec3 vNormalW;\n' + shader.vertexShader;
    shader.vertexShader = shader.vertexShader.replace(
      '#include <beginnormal_vertex>',
      `#include <beginnormal_vertex>
       vNormalW = normalize(mat3(modelMatrix) * objectNormal);`
    );

    shader.fragmentShader = 'varying vec3 vNormalW;\nuniform vec3 sunDir;\n' + shader.fragmentShader;

    // 12. Crank up night lights emissive multiplier to 1.8, colored incandescent gold vec3(1.0, 0.8, 0.4)
    shader.fragmentShader = shader.fragmentShader.replace(
      '#include <emissivemap_fragment>',
      `#include <emissivemap_fragment>
       float dotLight = dot(normalize(vNormalW), normalize(-sunDir));
       float nightMask = 1.0 - smoothstep(-0.2, 0.1, dotLight);
       totalEmissiveRadiance = texture2D(emissiveMap, vUv).rgb * vec3(1.0, 0.8, 0.4) * 1.8 * nightMask;`
    );

    // 10, 11. Specular color to dark deep navy (vec3(0.031, 0.063, 0.102)) and wrap diffuse lighting in a wider smoothstep curve
    shader.fragmentShader = shader.fragmentShader.replace(
      '#include <lights_physical_fragment>',
      `#include <lights_physical_fragment>
       float dotSoft = dot(normalize(vNormalW), normalize(-sunDir));
       float lightingSoft = smoothstep(-0.3, 0.3, dotSoft);
       float softFactor = lightingSoft / max(0.001, max(0.0, dotSoft));
       reflectedLight.directDiffuse *= clamp(softFactor, 0.0, 5.0);
       material.specularColor = vec3(0.031, 0.063, 0.102);`
    );
  };

  const earthMesh = new THREE.Mesh(new THREE.SphereGeometry(EARTH_R, 64, 64), earthMat);
  earthGroup.add(earthMesh);

  // 13. Asymmetric Atmospheric Limb: Halo only glows on sunward (left) edge, invisible on night (right) edge
  const atmoMat = new THREE.ShaderMaterial({
    uniforms: { sunDir: { value: SUN_DIR.clone() } },
    vertexShader: `varying vec3 vNormalV; varying vec3 vNormalW; varying vec3 vViewDir;
      void main(){ 
        vNormalV = normalize(normalMatrix*normal); 
        vNormalW = normalize(mat3(modelMatrix)*normal);
        vec4 mvPos = modelViewMatrix*vec4(position,1.0);
        vViewDir = normalize(-mvPos.xyz);
        gl_Position = projectionMatrix*mvPos;
      }`,
    fragmentShader: `uniform vec3 sunDir; varying vec3 vNormalV; varying vec3 vNormalW; varying vec3 vViewDir;
      void main(){
        vec3 normal = normalize(vNormalV);
        vec3 viewDir = normalize(vViewDir);
        float fresnel = pow(max(0.0, 1.0 - abs(dot(normal, viewDir))), 5.0);
        vec3 lightDir = normal;
        float alpha = fresnel * max(0.0, -lightDir.x);
        vec3 col = vec3(0.3, 0.6, 1.0);
        gl_FragColor = vec4(col, alpha * 0.3);
      }`,
    transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false,
  });
  earthGroup.add(new THREE.Mesh(new THREE.SphereGeometry(EARTH_R * 1.05, 64, 64), atmoMat));

  // 5, 6, 7, 8, 9. The Bow Shock Vanguard Shield
  const shockMat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 } },
    vertexShader: `
      varying vec3 vNormalV; varying vec3 vViewDir; varying vec2 vUv;
      void main(){
        vUv = uv;
        vNormalV = normalize(normalMatrix * normal);
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        vViewDir = normalize(-mvPos.xyz);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      uniform float time; varying vec3 vNormalV; varying vec3 vViewDir; varying vec2 vUv;
      
      ${NOISE}
      
      void main(){
        vec3 normal = normalize(vNormalV) * (gl_FrontFacing ? 1.0 : -1.0);
        vec3 viewDir = normalize(vViewDir);
        
        // 7. Force opacity to peak on leading sunward edge and dissolve to zero on trailing edge
        float leadingEdge = smoothstep(-0.2, -1.0, vNormalV.x);
        
        // 9. Scroll high-frequency procedural noise across bow shock UVs (left to right)
        float windNoise = snoise(vec3(vUv.x * 30.0 - time * 12.0, vUv.y * 30.0, 0.0)) * 0.5 + 0.5;
        
        // Center hollowing to not obscure Earth
        float hollow = pow(1.0 - max(0.0, dot(normal, viewDir)), 2.5);
        
        // 8. Luminous electric violet color and final opacity scaled by 0.25
        float alpha = leadingEdge * windNoise * hollow * 0.25;
        vec3 col = vec3(0.35, 0.1, 0.95);
        gl_FragColor = vec4(col, alpha); 
      }
    `,
    transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false,
  });
  
  const bowShock = new THREE.Mesh(new THREE.SphereGeometry(1.0, 64, 64), shockMat);
  // 5. Shift bow shock strictly upstream (left): set at -1.4
  bowShock.position.set(-1.4, 0.0, 0.0);
  // 6. Scale bow shock into wide open parabola: (1.2, 3.0, 3.0)
  bowShock.scale.set(1.2, 3.0, 3.0);
  shockGroup.add(bowShock);

  // 14, 15, 16. Magnetic Dipole and Synchrotron energy packets
  const fieldMats = [];
  const numLines = 15;
  const R = EARTH_R;
  // 14. Enforce strict polar anchors at (0, 0.98, 0) and (0, -0.98, 0)
  const start = new THREE.Vector3(0, 0.98, 0); 
  const end = new THREE.Vector3(0, -0.98, 0); 

  for (let k = 0; k < numLines; k++) {
    const theta = (k / numLines) * Math.PI * 2;
    const dirX = Math.cos(theta);
    const dirZ = Math.sin(theta);
    
    let cp1, cp2;
    if (dirX < 0) {
      // Sunward lines (squashed)
      cp1 = new THREE.Vector3(dirX * 2.0, R * 1.5, dirZ * 2.0);
      cp2 = new THREE.Vector3(dirX * 2.0, -R * 1.5, dirZ * 2.0);
    } else {
      // 15. Lock the night-side control points cp1 and cp2 strictly to the horizontal plane
      // y = baseDir.y * 0.2, z = baseDir.z * 0.2, x > 6.0
      cp1 = new THREE.Vector3(dirX * 12.0, (R * 2.0) * 0.2, (dirZ * 3.0) * 0.2);
      cp2 = new THREE.Vector3(dirX * 12.0, (-R * 2.0) * 0.2, (dirZ * 3.0) * 0.2);
    }
    
    const geo = new THREE.TubeGeometry(new THREE.CubicBezierCurve3(start, cp1, cp2, end), 64, 0.001, 4, false);
    const mat = new THREE.ShaderMaterial({
      uniforms: { time: { value: 0 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
      fragmentShader: `
        uniform float time; varying vec2 vUv;
        void main(){
          // 16. Animate bright white synchrotron energy packets traveling rapidly along dipole UVs
          float packet = smoothstep(0.88, 1.0, sin(vUv.x * 15.0 - time * 4.0));
          vec3 col = mix(vec3(0.0, 0.7, 1.0), vec3(1.0, 1.0, 1.0), packet);
          float fade = smoothstep(0.0, 0.1, vUv.x) * smoothstep(1.0, 0.9, vUv.x);
          gl_FragColor = vec4(col, fade * (0.15 + 0.85 * packet));
        }
      `,
      transparent: true, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    magGroup.add(new THREE.Mesh(geo, mat));
    fieldMats.push(mat);
  }

  // 1, 2, 3, 4. Auroral Ovals
  const auroraMats = [];
  function createAuroraMaterial(isSouth) {
    return new THREE.ShaderMaterial({
      uniforms: { time: { value: 0 }, boost: { value: state.auroraBoost }, isSouth: { value: isSouth ? 1.0 : 0.0 } },
      vertexShader: `
        varying vec2 vUv;
        varying float vLocalZ;
        void main(){ 
          vUv=uv; 
          vLocalZ = position.z;
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
        } `,
      fragmentShader: `
        uniform float time, boost, isSouth; 
        varying vec2 vUv;
        varying float vLocalZ;
        
        ${NOISE}
        
        void main(){
          // 2. Vertical color gradient: neon green at bottom facing Earth, deep violet at top facing space
          float t = clamp((vLocalZ * (isSouth > 0.5 ? -1.0 : 1.0) + 0.03) / 0.06, 0.0, 1.0);
          vec3 col = mix(vec3(0.0, 1.0, 0.2), vec3(0.4, 0.0, 0.8), t);
          
          // 3. Shimmering Curtain Shading: scroll Simplex noise mapped to vUv.x * 40.0 and time * 1.5
          float noiseVal = snoise(vec3(vUv.x * 40.0, time * 1.5, 0.0)) * 0.5 + 0.5;
          float v = smoothstep(0.0, 0.5, vUv.y) * smoothstep(1.0, 0.5, vUv.y);
          
          gl_FragColor = vec4(col * boost, noiseVal * v * 1.2);
        }
      `,
      transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
    });
  }

  // 4. Shrink major radius to 0.78, anchor ovals at y = 0.92 and y = -0.92
  const auroraGeo = new THREE.TorusGeometry(0.78, 0.03, 12, 100);

  const auroraNorthMat = createAuroraMaterial(false);
  const auroraNorth = new THREE.Mesh(auroraGeo, auroraNorthMat);
  auroraNorth.rotation.x = Math.PI / 2;
  auroraNorth.position.set(0, 0.92, 0);
  earthGroup.add(auroraNorth);
  auroraMats.push(auroraNorthMat);

  const auroraSouthMat = createAuroraMaterial(true);
  const auroraSouth = new THREE.Mesh(auroraGeo, auroraSouthMat);
  auroraSouth.rotation.x = Math.PI / 2;
  auroraSouth.position.set(0, -0.92, 0);
  earthGroup.add(auroraSouth);
  auroraMats.push(auroraSouthMat);

  let windGeo, windVel;
  (function solarWind() {
    const N = 600, pos = new Float32Array(N*3); windVel = [];
    for (let i=0;i<N;i++){ pos[i*3]=GROUP_X-3.5-Math.random()*2.0; pos[i*3+1]=(Math.random()-0.5)*4.0; pos[i*3+2]=(Math.random()-0.5)*4.0; windVel.push(0.02+Math.random()*0.02); }
    windGeo = new THREE.BufferGeometry();
    windGeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    scene.add(new THREE.Points(windGeo, new THREE.PointsMaterial({ color:0xffa544, size:0.03, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending, depthWrite:false })));
  })();
  function stepWind() {
    const pos = windGeo.attributes.position, standoff = 1.7;
    for (let i=0;i<windVel.length;i++){
      let x=pos.array[i*3]-GROUP_X, y=pos.array[i*3+1], z=pos.array[i*3+2];
      x += windVel[i];
      const ryz = Math.hypot(y,z);
      if (x > -standoff && x < standoff && ryz < standoff) { const push=(standoff-ryz)*0.045; y+=(y/(ryz+1e-3))*push; z+=(z/(ryz+1e-3))*push; }
      if (x > 5.0) { x=-4.5-Math.random(); y=(Math.random()-0.5)*4.0; z=(Math.random()-0.5)*4.0; }
      pos.array[i*3]=x+GROUP_X; pos.array[i*3+1]=y; pos.array[i*3+2]=z;
    }
    pos.needsUpdate = true;
  }

  const starMats = [];
  (function stars() {
    const N=1800, pos=new Float32Array(N*3), ph=new Float32Array(N);
    for(let i=0;i<N;i++){ const r=40+Math.random()*40,u=Math.random()*2-1,th=Math.random()*Math.PI*2,s=Math.sqrt(1-u*u);
      pos[i*3]=r*s*Math.cos(th); pos[i*3+1]=r*u; pos[i*3+2]=r*s*Math.sin(th); ph[i]=Math.random()*6.28; }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos,3));
    g.setAttribute('phase', new THREE.BufferAttribute(ph,1));
    const m=new THREE.ShaderMaterial({ uniforms:{ time:{value:0} },
      vertexShader:`attribute float phase; uniform float time; varying float vTw;
        void main(){ vTw=0.5+0.5*sin(time*2.0+phase); vec4 mv=modelViewMatrix*vec4(position,1.0);
          gl_PointSize=(7.0/-mv.z)*(0.6+0.8*vTw); gl_Position=projectionMatrix*mv; }`,
      // 19. Desaturate starfield (0xffffff -> vec3(1.0)) and lock opacity at 0.18
      fragmentShader:`varying float vTw; void main(){ vec2 c=gl_PointCoord-0.5;
        float d=1.0-smoothstep(0.0,0.5,length(c)); gl_FragColor=vec4(vec3(1.0), d*(0.3+0.7*vTw) * 0.18); }`,
      transparent:true, blending:THREE.AdditiveBlending, depthWrite:false });
    scene.add(new THREE.Points(g,m)); starMats.push(m);
  })();

  const composer = new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene, camera));
  
  // 17. Calibrate Post-Bloom: threshold: 0.45, strength: 1.3, radius: 0.6
  const bloom = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.3, 0.6, 0.45);
  composer.addPass(bloom);
  
  const caPass = new THREE.ShaderPass({
    uniforms: { tDiffuse: { value: null }, amount: { value: 0.0018 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
    fragmentShader: `uniform sampler2D tDiffuse; uniform float amount; varying vec2 vUv;
      void main(){ vec2 dir=vUv-0.5; vec2 off=dir*length(dir)*amount*3.0;
        gl_FragColor=vec4(texture2D(tDiffuse,vUv-off).r, texture2D(tDiffuse,vUv).g, texture2D(tDiffuse,vUv+off).b, 1.0);} `
  });
  composer.addPass(caPass);
  
  const grainPass = new THREE.ShaderPass({
    uniforms: { tDiffuse: { value: null }, time: { value: 0 }, opacity: { value: 0.05 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
    fragmentShader: `uniform sampler2D tDiffuse; uniform float time,opacity; varying vec2 vUv;
      float rand(vec2 c){ return fract(sin(dot(c,vec2(12.9898,78.233)))*43758.5453); }
      void main(){ vec4 col=texture2D(tDiffuse,vUv); col.rgb += (rand(vUv+fract(time))-0.5)*opacity; gl_FragColor=col; }`
  });
  composer.addPass(grainPass);

  const telemetryEl = document.getElementById('telemetry');
  setInterval(() => { if (telemetryEl)
    telemetryEl.innerHTML = `Bz: ${state.bz.toFixed(1)} nT<br>Vsw: 782 km/s | FPS: ${Math.floor(59+Math.random()*2)} <span class="live-indicator">● LIVE</span>`;
  }, 400);

  let dragging=false, lx=0, ly=0, autorot=true, lastUp=0;
  canvas.addEventListener('mousedown', e=>{ dragging=true; lx=e.clientX; ly=e.clientY; });
  window.addEventListener('mouseup', ()=>{ if(dragging){ dragging=false; lastUp=performance.now(); } });
  window.addEventListener('mousemove', e=>{ if(!dragging) return;
    earthGroup.rotation.y += (e.clientX-lx)*0.005;
    earthGroup.rotation.x = Math.max(-1.1, Math.min(1.1, earthGroup.rotation.x + (e.clientY-ly)*0.005));
    lx=e.clientX; ly=e.clientY; });
  canvas.addEventListener('wheel', e=>{ e.preventDefault();
    camera.position.z = Math.max(3.5, Math.min(10, camera.position.z + e.deltaY*0.0025)); }, { passive:false });

  window.addEventListener('resize', ()=>{ const w=window.innerWidth,h=window.innerHeight;
    renderer.setSize(w,h); composer.setSize(w,h); bloom.resolution.set(w,h);
    camera.aspect=w/h; camera.updateProjectionMatrix(); });

  const clock = new THREE.Clock();
  function tick(t) {
    if (autorot && !dragging && performance.now()-lastUp > 2000) earthGroup.rotation.y += 0.0009;
    
    shockMat.uniforms.time.value = t;
    for (let i=0;i<fieldMats.length;i++) fieldMats[i].uniforms.time.value = t;
    for (let i=0;i<auroraMats.length;i++){ auroraMats[i].uniforms.time.value = t; auroraMats[i].uniforms.boost.value = state.auroraBoost; }
    for (let i=0;i<starMats.length;i++) starMats[i].uniforms.time.value = t;
    grainPass.uniforms.time.value = t;
    stepWind();
    composer.render();
  }
  window.__render = function (t){ tick(typeof t==='number'?t:clock.getElapsedTime()); };
  (function animate(){ requestAnimationFrame(animate); tick(clock.getElapsedTime()); })();
})();
</script>
</body>
</html>
