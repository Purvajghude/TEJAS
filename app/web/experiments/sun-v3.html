<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TEJAS · Experiment: Procedural Sun (sun-v3)</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  #c { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed; left: 24px; bottom: 22px;
    font: 600 12px/1.5 "Segoe UI", system-ui, sans-serif;
    letter-spacing: 0.24em; color: rgba(255,255,255,0.72);
    text-transform: uppercase; pointer-events: none; user-select: none;
  }
  .label small { display:block; letter-spacing:0.05em; text-transform:none;
    color: rgba(255,255,255,0.34); font-weight:500; margin-top:4px; }
  .hint { position: fixed; right: 24px; bottom: 22px;
    font: 500 11px/1.4 "Segoe UI", system-ui, sans-serif;
    color: rgba(255,255,255,0.30); pointer-events:none; user-select:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="label">Quiet Sun<small>sun-v3 · procedural · no textures</small></div>
<div class="hint">drag to rotate · scroll to zoom</div>

<!-- Three.js r128 + post-processing (CDN, no build step) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/MaskPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
(function () {
  const canvas = document.getElementById('c');
  const SUN_RADIUS = 1.0;

  // ---------- renderer ----------
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // capped: full DPR risks venue-GPU FPS
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;   // HDR -> displayable, lets >1.0 bloom
  renderer.toneMappingExposure = 1.2;
  renderer.setClearColor(0x000000, 1.0);

  const scene = new THREE.Scene();   // NO lights: the sun is 100% emissive via shaders
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 3.2);

  // everything sits in a group offset left-of-center (rule-of-thirds framing)
  const sunSystem = new THREE.Group();
  sunSystem.position.x = -0.45;
  scene.add(sunSystem);

  // ---------- shared GLSL: 3D simplex noise (Ashima) ----------
  const NOISE = `
    vec3 mod289(vec3 x){return x - floor(x*(1.0/289.0))*289.0;}
    vec4 mod289(vec4 x){return x - floor(x*(1.0/289.0))*289.0;}
    vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
    vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314*r;}
    float snoise(vec3 v){
      const vec2 C = vec2(1.0/6.0, 1.0/3.0);
      const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
      vec3 i  = floor(v + dot(v, C.yyy));
      vec3 x0 = v - i + dot(i, C.xxx);
      vec3 g = step(x0.yzx, x0.xyz);
      vec3 l = 1.0 - g;
      vec3 i1 = min(g.xyz, l.zxy);
      vec3 i2 = max(g.xyz, l.zxy);
      vec3 x1 = x0 - i1 + C.xxx;
      vec3 x2 = x0 - i2 + C.yyy;
      vec3 x3 = x0 - D.yyy;
      i = mod289(i);
      vec4 p = permute( permute( permute(
                 i.z + vec4(0.0, i1.z, i2.z, 1.0))
               + i.y + vec4(0.0, i1.y, i2.y, 1.0))
               + i.x + vec4(0.0, i1.x, i2.x, 1.0));
      float n_ = 0.142857142857;
      vec3 ns = n_ * D.wyz - D.xzx;
      vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
      vec4 x_ = floor(j * ns.z);
      vec4 y_ = floor(j - 7.0 * x_);
      vec4 x = x_ * ns.x + ns.yyyy;
      vec4 y = y_ * ns.x + ns.yyyy;
      vec4 h = 1.0 - abs(x) - abs(y);
      vec4 b0 = vec4(x.xy, y.xy);
      vec4 b1 = vec4(x.zw, y.zw);
      vec4 s0 = floor(b0)*2.0 + 1.0;
      vec4 s1 = floor(b1)*2.0 + 1.0;
      vec4 sh = -step(h, vec4(0.0));
      vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
      vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
      vec3 p0 = vec3(a0.xy, h.x);
      vec3 p1 = vec3(a0.zw, h.y);
      vec3 p2 = vec3(a1.xy, h.z);
      vec3 p3 = vec3(a1.zw, h.w);
      vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
      p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
      vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
      m = m*m;
      return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
    }
    float fbm(vec3 p){
      float v = 0.0, a = 0.5;
      for (int i = 0; i < 4; i++){ v += a*snoise(p); p *= 2.0; a *= 0.5; }
      return v;
    }
  `;

  // ---------- the photosphere ----------
  const sunGeo = new THREE.SphereGeometry(SUN_RADIUS, 128, 128);
  const sunMat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 } },
    vertexShader: `
      varying vec3 vPos;
      varying vec3 vNormalV;
      void main(){
        vPos = position;
        vNormalV = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: NOISE + `
      uniform float time;
      varying vec3 vPos;
      varying vec3 vNormalV;

      // Crimson floor -> yellow-white peak. No black anywhere (per ILM note #3).
      vec3 ramp(float t){
        vec3 c0 = vec3(0.50, 0.05, 0.0);   // deep crimson floor
        vec3 c1 = vec3(0.80, 0.18, 0.0);   // red-orange
        vec3 c2 = vec3(1.00, 0.45, 0.05);  // orange
        vec3 c3 = vec3(1.00, 0.72, 0.20);  // gold
        vec3 c4 = vec3(1.00, 0.95, 0.80);  // yellow-white peak
        vec3 c = mix(c0, c1, smoothstep(0.00, 0.30, t));
        c = mix(c, c2, smoothstep(0.30, 0.55, t));
        c = mix(c, c3, smoothstep(0.55, 0.80, t));
        c = mix(c, c4, smoothstep(0.80, 1.00, t));
        return c;
      }

      void main(){
        vec3 p = normalize(vPos);
        float t = time * 0.06;   // core animates slow (0.4x of corona; see loop)

        // domain warping: noise(p + noise(p)) -> viscous, liquid plasma
        float w = fbm(p * 2.5 + vec3(0.0, t, 0.0));
        vec3 wp = p + w * 0.28;

        // shrunk, multi-scale granulation (freq x12+ per ILM #8)
        float conv = fbm(wp * 5.0  - vec3(t * 0.5));
        float gran = fbm(wp * 16.0 + vec3(t * 1.4));
        float fine = fbm(wp * 34.0 + vec3(t * 2.2));
        float n = 0.50 * conv + 0.34 * gran + 0.16 * fine;
        n = clamp(n * 0.5 + 0.5, 0.0, 1.0);
        n = pow(n, 1.30);

        // discrete bright active-region faculae
        float ar = smoothstep(0.72, 0.95, fbm(wp * 2.0 + vec3(t * 0.3)));
        n = mix(n, min(1.0, n + 0.55), ar * 0.85);

        vec3 col = ramp(n);

        // limb darkening + reddening (floor stays crimson, never black)
        float ndv = max(dot(normalize(vNormalV), vec3(0.0, 0.0, 1.0)), 0.0);
        float limb = pow(ndv, 0.5);
        col *= mix(0.55, 1.15, limb);
        col = mix(col * vec3(1.0, 0.55, 0.30), col, limb);

        // internal Fresnel rim glow on the core (ILM #15)
        float rim = pow(1.0 - ndv, 3.0);
        col += vec3(1.0, 0.55, 0.18) * rim * 1.2;

        // HDR: do NOT clamp — let hot regions exceed 1.0 for the bloom pass (ILM #11)
        col *= 1.45;

        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
  const sun = new THREE.Mesh(sunGeo, sunMat);
  sun.renderOrder = 1;
  sunSystem.add(sun);

  // ---------- corona / atmosphere (additive, fresnel-faded, anisotropic filaments) ----------
  function makeCorona(radius, power, alpha, freq, aniso, inner, outer, order) {
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        time:   { value: 0 },
        power:  { value: power },
        alpha:  { value: alpha },
        freq:   { value: freq },
        aniso:  { value: new THREE.Vector3(aniso[0], aniso[1], aniso[2]) },
        cInner: { value: new THREE.Color(inner[0], inner[1], inner[2]) },
        cOuter: { value: new THREE.Color(outer[0], outer[1], outer[2]) },
      },
      vertexShader: `
        varying vec3 vPos; varying vec3 vNormalV;
        void main(){
          vPos = position;
          vNormalV = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: NOISE + `
        uniform float time; uniform float power; uniform float alpha; uniform float freq;
        uniform vec3 aniso; uniform vec3 cInner; uniform vec3 cOuter;
        varying vec3 vPos; varying vec3 vNormalV;
        void main(){
          float ndv = max(dot(normalize(vNormalV), vec3(0.0,0.0,1.0)), 0.0);
          // Fresnel fades the rim to 0 opacity -> no hard shell edge (ILM #5)
          float fres = pow(1.0 - ndv, power);
          // anisotropic noise: stretch domain so filaments streak radially outward (ILM #7)
          vec3 np = normalize(vPos) * aniso;
          float fil = fbm(np * freq + vec3(time * 0.15, time * 0.10, time * 0.05));
          float f = fres * (0.45 + 0.85 * fil);
          // gold -> amber blackbody (ILM #4), HDR (unclamped)
          vec3 col = mix(cOuter, cInner, fres) * 1.3;
          gl_FragColor = vec4(col, max(f, 0.0) * alpha);
        }
      `,
      transparent: true,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      depthWrite: false,
    });
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 64, 64), mat);
    mesh.renderOrder = order;
    sunSystem.add(mesh);
    return { mesh, mat };
  }
  // inner shell OVERLAPS the core (1.02) to eliminate the black gap ring (ILM #6),
  // outer shell extends far and fresnel-fades to nothing -> one continuous atmosphere.
  const coronaInner = makeCorona(1.02, 2.6, 0.55, 7.0, [1.0, 1.0, 0.45],
                                 [1.0, 0.62, 0.10], [1.0, 0.40, 0.05], 2);
  const coronaOuter = makeCorona(2.10, 3.2, 0.22, 5.0, [1.0, 1.0, 0.35],
                                 [1.0, 0.55, 0.12], [1.0, 0.35, 0.04], 3);

  // ---------- prominences: thin tubes on the limb to break the silhouette (ILM #18) ----------
  const proms = [];
  (function makeProminences() {
    const N = 10;
    for (let k = 0; k < N; k++) {
      const d = new THREE.Vector3(Math.random()*2-1, Math.random()*2-1, Math.random()*2-1).normalize();
      let a = new THREE.Vector3().crossVectors(d, new THREE.Vector3(0,1,0));
      if (a.lengthSq() < 0.01) a = new THREE.Vector3().crossVectors(d, new THREE.Vector3(1,0,0));
      a.normalize();
      const sep = 0.10 + Math.random()*0.10;
      const hgt = 0.12 + Math.random()*0.20;
      const pts = [
        d.clone().multiplyScalar(SUN_RADIUS).addScaledVector(a, -sep),
        d.clone().multiplyScalar(SUN_RADIUS*(1+hgt*0.55)).addScaledVector(a, -sep*0.4),
        d.clone().multiplyScalar(SUN_RADIUS*(1+hgt)),
        d.clone().multiplyScalar(SUN_RADIUS*(1+hgt*0.55)).addScaledVector(a, sep*0.4),
        d.clone().multiplyScalar(SUN_RADIUS).addScaledVector(a, sep),
      ];
      const curve = new THREE.CatmullRomCurve3(pts);
      const geo = new THREE.TubeGeometry(curve, 24, 0.010 + Math.random()*0.006, 6, false);
      const mat = new THREE.ShaderMaterial({
        uniforms: { time: { value: 0 }, phase: { value: Math.random()*6.28 } },
        vertexShader: `
          varying vec2 vUv;
          void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
        `,
        fragmentShader: `
          uniform float time; uniform float phase; varying vec2 vUv;
          void main(){
            vec3 hot = vec3(1.0, 0.85, 0.45);
            vec3 cool = vec3(1.0, 0.25, 0.03);
            vec3 col = mix(cool, hot, vUv.x);            // base -> tip gradient
            float tip = smoothstep(0.0,0.12,vUv.x) * smoothstep(1.0,0.86,vUv.x);
            float pulse = 0.7 + 0.3*sin(time*2.0 + phase);
            gl_FragColor = vec4(col * 1.4, tip * pulse * 0.9);
          }
        `,
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.renderOrder = 2;
      sunSystem.add(mesh);
      proms.push(mat);
    }
  })();

  // ---------- starfield ----------
  (function stars() {
    const N = 3500;
    const pos = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      const r = 30 + Math.random() * 40;
      const u = Math.random() * 2 - 1;
      const th = Math.random() * Math.PI * 2;
      const s = Math.sqrt(1 - u * u);
      pos[i*3]   = r * s * Math.cos(th);
      pos[i*3+1] = r * u;
      pos[i*3+2] = r * s * Math.sin(th);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const m = new THREE.PointsMaterial({
      color: 0xffffff, size: 0.085, sizeAttenuation: true,
      transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    scene.add(new THREE.Points(g, m));
  })();

  // ---------- post-processing: bloom (ILM #12 explicit values) ----------
  const composer = new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene, camera));
  const bloom = new THREE.UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    1.8,   // strength
    0.85,  // radius
    0.10   // threshold (low -> incandescent)
  );
  composer.addPass(bloom);

  // ---------- interaction ----------
  let dragging = false, lx = 0, ly = 0, autorot = true, lastUp = 0;
  canvas.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; });
  window.addEventListener('mouseup', () => { if (dragging) { dragging = false; lastUp = performance.now(); } });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    sunSystem.rotation.y += (e.clientX - lx) * 0.005;
    sunSystem.rotation.x += (e.clientY - ly) * 0.005;
    sunSystem.rotation.x = Math.max(-1.2, Math.min(1.2, sunSystem.rotation.x));
    lx = e.clientX; ly = e.clientY;
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    camera.position.z = Math.max(1.8, Math.min(7, camera.position.z + e.deltaY * 0.002));
  }, { passive: false });

  // ---------- resize ----------
  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    composer.setSize(w, h);
    bloom.resolution.set(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  // ---------- loop ----------
  const clock = new THREE.Clock();
  function tick(tt) {
    // core uTime locked to 0.4x corona speed (ILM #20)
    sunMat.uniforms.time.value = tt * 0.4;
    coronaInner.mat.uniforms.time.value = tt;
    coronaOuter.mat.uniforms.time.value = tt;
    for (let i = 0; i < proms.length; i++) proms[i].uniforms.time.value = tt;
    composer.render();
  }
  // verification hook (preview tab is hidden -> rAF throttled; lets us force one frame)
  window.__render = function (t) { tick(typeof t === 'number' ? t : clock.getElapsedTime()); };

  (function animate() {
    requestAnimationFrame(animate);
    if (autorot && !dragging && performance.now() - lastUp > 2000) {
      sunSystem.rotation.y += 0.0012;
    }
    tick(clock.getElapsedTime());
  })();
})();
</script>
</body>
</html>
